spring.application.name=objetsperdus

# Base de donnees H2 en memoire
spring.datasource.url=jdbc:h2:mem:objetsperdus;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Console H2 accessible sur http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

server.port=8080
# Correction pour les redirections derrière un reverse proxy (GitHub Codespaces)
server.tomcat.use-relative-redirects=true
server.forward-headers-strategy=framework


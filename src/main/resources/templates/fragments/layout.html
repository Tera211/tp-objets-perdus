<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(titre)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${titre}">Objets Perdus</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: "Segoe UI", Arial, sans-serif; background: #eef2f7; color: #1f2d3d; }
        a { color: #1d6fb8; text-decoration: none; }
        a:hover { text-decoration: underline; }
        header { background: #0f4c81; color: #fff; padding: 0 24px; box-shadow: 0 2px 6px rgba(0,0,0,.15); }
        nav { display: flex; align-items: center; gap: 18px; height: 58px; max-width: 1080px; margin: 0 auto; }
        nav .brand { font-weight: 700; font-size: 1.15rem; color: #fff; }
        nav a { color: #d7e6f5; }
        nav a:hover { color: #fff; text-decoration: none; }
        nav .spacer { flex: 1; }
        nav .badge { background: #e84545; border-radius: 10px; padding: 1px 7px; font-size: .75rem; margin-left: 4px; }
        .container { max-width: 1080px; margin: 26px auto; padding: 0 24px; }
        .card { background: #fff; border-radius: 10px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,.08); margin-bottom: 18px; }
        h1 { font-size: 1.5rem; }
        h2 { font-size: 1.2rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
        .tag { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: .75rem; font-weight: 600; }
        .tag-perdu { background: #fde2e2; color: #b42318; }
        .tag-trouve { background: #dcf5e4; color: #137333; }
        .tag-cat { background: #e6eef7; color: #0f4c81; }
        .statut { font-size: .75rem; font-weight: 600; padding: 2px 8px; border-radius: 10px; }
        .s-attente { background: #fff3cd; color: #8a6d3b; }
        .s-validee { background: #dcf5e4; color: #137333; }
        .s-rejetee { background: #fde2e2; color: #b42318; }
        .s-cloturee { background: #e2e3e5; color: #41464b; }
        label { display: block; margin: 12px 0 4px; font-weight: 600; font-size: .9rem; }
        input, select, textarea { width: 100%; padding: 9px; border: 1px solid #c7d0da; border-radius: 6px; font-size: .95rem; font-family: inherit; }
        textarea { min-height: 90px; resize: vertical; }
        .btn { display: inline-block; background: #1d6fb8; color: #fff; border: none; padding: 9px 16px; border-radius: 6px; cursor: pointer; font-size: .92rem; }
        .btn:hover { background: #155a96; text-decoration: none; }
        .btn-success { background: #137333; }
        .btn-success:hover { background: #0e5a28; }
        .btn-danger { background: #b42318; }
        .btn-danger:hover { background: #911c13; }
        .btn-sm { padding: 5px 11px; font-size: .82rem; }
        .alert { padding: 11px 14px; border-radius: 6px; margin-bottom: 14px; }
        .alert-error { background: #fde2e2; color: #b42318; }
        .alert-info { background: #e6eef7; color: #0f4c81; }
        .filtres { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr auto; gap: 10px; align-items: end; }
        .muted { color: #6b7785; font-size: .85rem; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 9px; border-bottom: 1px solid #eaeef3; font-size: .9rem; }
        th { color: #6b7785; font-weight: 600; }
        .actions { display: flex; gap: 8px; }
        @media (max-width: 720px) { .filtres { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<header th:fragment="navbar">
    <nav>
        <a class="brand" th:href="@{/}">🔎 Objets Perdus</a>
        <a th:href="@{/}">Rechercher</a>
        <a th:href="@{/annonces/nouvelle}">Declarer</a>
        <a th:if="${connecte != null}" th:href="@{/mes-annonces}">Mes annonces</a>
        <a th:if="${connecte != null and connecte.role.name() == 'GESTIONNAIRE'}" th:href="@{/gestion/moderation}">Moderation</a>
        <a th:if="${connecte != null and connecte.role.name() == 'GESTIONNAIRE'}" th:href="@{/gestion/relations}">Relations</a>
        <span class="spacer"></span>
        <span th:if="${connecte != null}">
            <span th:text="'Bonjour, ' + ${connecte.prenom}">Bonjour</span>
            &nbsp;<a th:href="@{/deconnexion}">Deconnexion</a>
        </span>
        <span th:if="${connecte == null}">
            <a th:href="@{/connexion}">Connexion</a>
            &nbsp;<a th:href="@{/inscription}">Inscription</a>
        </span>
    </nav>
</header>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Inscription')}"></head>
<body>
<header th:replace="~{fragments/layout :: navbar}"></header>

<div class="container" style="max-width:480px;">
    <h1>Creer un compte</h1>
    <div class="card">
        <div class="alert alert-error" th:if="${erreur}" th:text="${erreur}"></div>
        <form method="post" th:action="@{/inscription}" th:object="${utilisateur}">
            <label>Nom</label>
            <input type="text" th:field="*{nom}"/>
            <p class="alert alert-error" th:if="${#fields.hasErrors('nom')}" th:errors="*{nom}"></p>

            <label>Prenom</label>
            <input type="text" th:field="*{prenom}"/>
            <p class="alert alert-error" th:if="${#fields.hasErrors('prenom')}" th:errors="*{prenom}"></p>

            <label>Email</label>
            <input type="email" th:field="*{email}"/>
            <p class="alert alert-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>

            <label>Telephone</label>
            <input type="text" th:field="*{telephone}"/>

            <label>Mot de passe</label>
            <input type="password" th:field="*{motDePasse}"/>
            <p class="alert alert-error" th:if="${#fields.hasErrors('motDePasse')}" th:errors="*{motDePasse}"></p>

            <p style="margin-top:14px;"><button type="submit" class="btn">S'inscrire</button></p>
        </form>
        <p class="muted">Deja un compte ? <a th:href="@{/connexion}">Se connecter</a></p>
    </div>
</div>
</body>
</html>
